<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B1A40" />
<title>NeXtGen Stimme — Story</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  /* standalone article-landing page (reached by scanning a QR) */
  body{display:block;place-items:initial;padding:0;background:
    radial-gradient(900px 460px at 12% -10%, #E9F0FF 0%, transparent 55%),
    radial-gradient(800px 520px at 112% 8%, #F0EBFF 0%, transparent 50%),
    var(--paper);}
  .page{max-width:480px;margin:0 auto;padding:18px 18px 64px;min-height:100dvh}
  .pagebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-top:env(safe-area-inset-top)}
  .pagebar .brand{display:flex;flex-direction:column;line-height:1}
  .pagebar .wordmark{font-family:var(--display);font-weight:800;font-size:18px;color:var(--navy)}
  .pagebar .wordmark .x{color:var(--blue)}
  .pagebar .tagline{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);font-weight:600;margin-top:3px}
  .applink{font-size:12px;font-weight:700;color:var(--blue);text-decoration:none;background:var(--blue-wash);padding:9px 13px;border-radius:11px}

  .vote-card{margin-top:18px;background:#fff;border:1px solid var(--hair);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
  .vote-card .eyebrow{color:var(--blue)}
  .vote-card h3{font-family:var(--display);font-weight:700;font-size:19px;color:var(--navy);margin:6px 0 0;line-height:1.25}
  .vote-card .vsub{color:var(--muted);font-size:13px;margin-top:6px}
  .vote-actions{display:flex;gap:12px;margin-top:16px}
  .vote-actions button{flex:1;border:0;border-radius:14px;padding:16px;font-family:var(--body);font-weight:800;font-size:16px;cursor:pointer;color:#fff;transition:transform .12s}
  .vote-actions button:active{transform:scale(.97)}
  .vote-actions .no{background:var(--coral)}
  .vote-actions .yes{background:var(--green)}
  .vote-result{margin-top:6px}
  .vote-thanks{margin-top:14px;text-align:center;font-size:13px;font-weight:700;color:#0A6B3B;background:var(--mint);border:1px solid #CFEEDD;border-radius:12px;padding:11px}
  .applink-big{display:block;text-align:center;text-decoration:none;margin-top:18px}
</style>
</head>
<body>
  <div class="page">
    <div class="pagebar">
      <div class="brand">
        <div class="wordmark">Ne<span class="x">X</span>tGen Stimme</div>
        <div class="tagline">Your city. Your voice.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="seg" id="langSeg"><button data-lang="de" class="on">DE</button><button data-lang="en">EN</button></div>
        <a class="applink" id="appLink" href="./">Ganze App →</a>
      </div>
    </div>
    <div id="art"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/articles.js"></script>
  <script src="js/config.js"></script>
  <script src="js/live.js"></script>
  <script>
  (function () {
    "use strict";
    function $(s, el) { return (el || document).querySelector(s); }
    function esc(t) { return String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    var params = new URLSearchParams(location.search);
    var id = params.get("id") || NGS.FEATURED_ID || NGS.ARTICLES[0].id;
    var a = null;
    for (var i = 0; i < NGS.ARTICLES.length; i++) if (NGS.ARTICLES[i].id === id) { a = NGS.ARTICLES[i]; break; }
    if (!a) a = NGS.ARTICLES[0];

    var lang = "de";
    var cardId = "art_" + a.id;
    var voted = false, sub = null, lastRes = null, lastMode = null;

    /* page-specific UI strings */
    var UI = {
      de: {
        applink: "Ganze App →", read_min: "Min Lesezeit", ai_summary: "KI-Zusammenfassung",
        source: "Originalquelle auf stimme.de", pulse_eyebrow: "Stimme Pulse",
        vote_q: "Gut für Heilbronn?", vote_sub: "Stimme ab und sieh das Live-Ergebnis aus der Stadt.",
        yes_caps: "JA", no_caps: "NEIN", thanks: "Danke! Deine Stimme zählt für Heilbronn.",
        live_loading: "Live-Ergebnisse werden geladen…", live_label: "live aus Heilbronn",
        stimme: "Stimme", stimmen: "Stimmen", live_off: "Live momentan nicht erreichbar",
        example: "Beispielwerte", example_dist: "Beispielverteilung · richte Supabase ein für echte Live-Stimmen",
        app_big: "Mehr aus Heilbronn in der App →",
        disclaimer: "Demo-Inhalt im Stil der Heilbronner Stimme · KI-Zusammenfassung automatisch erzeugt"
      },
      en: {
        applink: "Full app →", read_min: "min read", ai_summary: "AI summary",
        source: "Original source on stimme.de", pulse_eyebrow: "Stimme Pulse",
        vote_q: "Good for Heilbronn?", vote_sub: "Vote and see the live result from the city.",
        yes_caps: "YES", no_caps: "NO", thanks: "Thanks! Your vote counts for Heilbronn.",
        live_loading: "Loading live results…", live_label: "live from Heilbronn",
        stimme: "vote", stimmen: "votes", live_off: "Live currently unavailable",
        example: "example values", example_dist: "Example distribution · set up Supabase for real live votes",
        app_big: "More from Heilbronn in the app →",
        disclaimer: "Demo content in the style of Heilbronner Stimme · AI summary generated automatically"
      }
    };
    function U(k) { return (UI[lang] && UI[lang][k] != null) ? UI[lang][k] : (UI.de[k] != null ? UI.de[k] : k); }
    var EN = function () { return lang === "en"; };
    function T()   { return EN() && a.titleEn ? a.titleEn : a.title; }
    function D()   { return EN() && a.dekEn   ? a.dekEn   : a.dek; }
    function BODY(){ return EN() && a.bodyEn  ? a.bodyEn  : a.body; }
    function AI()  { return EN() && a.aiEn    ? a.aiEn    : a.ai; }
    function CAT() { return EN() ? (NGS.topic(a.topic).labelEn || a.cat).toUpperCase() : a.cat; }

    NGS.Live.init();
    render();

    function digestHtml() {
      var bullets = AI().map(function (t, i) { return '<li class="in"><b>' + (i + 1) + '</b><span>' + esc(t) + '</span></li>'; }).join("");
      return '<div class="digest">' +
        '<div class="digest-head">' +
          '<span class="ai-tag"><svg viewBox="0 0 24 24"><path d="M12 2l2.2 5.8L20 10l-5.8 2.2L12 18l-2.2-5.8L4 10l5.8-2.2z"/></svg>' + U("ai_summary") + '</span>' +
          '<div class="seg"><button data-lang="de" class="' + (lang === "de" ? "on" : "") + '">DE</button>' +
          '<button data-lang="en" class="' + (lang === "en" ? "on" : "") + '">EN</button></div>' +
        '</div><div class="ai-box"><ul>' + bullets + '</ul></div></div>';
    }

    function render() {
      document.documentElement.lang = lang;
      $("#langSeg").querySelectorAll("button").forEach(function (b) { b.classList.toggle("on", b.dataset.lang === lang); });
      $("#appLink").textContent = U("applink");
      var grad = NGS.topic(a.topic).grad;
      $("#art").innerHTML =
        '<div class="reader-hero" style="background:' + grad + '"><div class="rh-top"><span class="ac-cat">' + esc(CAT()) + '</span>' + (a.premium ? '<span class="ac-prem">ST+</span>' : '') + '</div></div>' +
        '<h1 class="reader-title">' + esc(T()) + '</h1>' +
        '<div class="reader-meta"><span>' + esc(a.date) + '</span><span>·</span><span>' + a.read + ' ' + U("read_min") + '</span></div>' +
        '<p class="reader-dek">' + esc(D()) + '</p>' +
        '<div id="digestWrap">' + digestHtml() + '</div>' +
        '<div class="reader-body">' + BODY().map(function (p) { return '<p>' + esc(p) + '</p>'; }).join("") + '</div>' +
        '<a class="source-link" href="https://www.stimme.de" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M14 3h7v7M21 3l-9 9M21 14v5a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h5"/></svg>' + U("source") + '</a>' +

        '<div class="vote-card">' +
          '<div class="eyebrow">' + U("pulse_eyebrow") + '</div>' +
          '<h3>' + U("vote_q") + '</h3>' +
          '<div class="vsub">' + U("vote_sub") + '</div>' +
          '<div class="vote-actions" id="voteActions">' +
            '<button class="no" data-vote="no">' + U("no_caps") + '</button>' +
            '<button class="yes" data-vote="yes">' + U("yes_caps") + '</button>' +
          '</div>' +
          '<div class="vote-result" id="voteResult" hidden>' +
            '<div class="stat yes"><div class="row"><span class="lab">' + U("yes_caps") + '</span><span data-pct="yes">–</span></div><div class="bar"><i class="fill" data-fill="yes"></i></div></div>' +
            '<div class="stat no"><div class="row"><span class="lab">' + U("no_caps") + '</span><span data-pct="no">–</span></div><div class="bar"><i class="fill" data-fill="no"></i></div></div>' +
            '<div class="vote-count" data-votecount></div>' +
            '<div class="vote-thanks">' + U("thanks") + '</div>' +
          '</div>' +
        '</div>' +

        '<a class="btn applink-big" href="./">' + U("app_big") + '</a>' +
        '<div class="reader-disclaimer">' + U("disclaimer") + '</div>';

      // preserve vote state across a language switch
      if (voted) {
        $("#voteActions").style.display = "none";
        $("#voteResult").hidden = false;
        if (lastRes) applyResult(lastRes, lastMode);
      }
    }

    function setLoading() {
      var r = $("#voteResult");
      r.querySelector('[data-pct="yes"]').textContent = "…";
      r.querySelector('[data-pct="no"]').textContent = "…";
      r.querySelector("[data-votecount]").innerHTML = '<span class="live-dot"></span>' + U("live_loading");
    }

    function applyResult(res, mode) {
      lastRes = res; lastMode = mode;
      var r = $("#voteResult");
      var yes = res.yes || 0, no = res.no || 0, total = yes + no;
      var yp = total ? Math.round(yes / total * 100) : 0, np = total ? 100 - yp : 0;
      r.querySelector('[data-pct="yes"]').textContent = yp + "%";
      r.querySelector('[data-pct="no"]').textContent = np + "%";
      r.querySelector('[data-fill="yes"]').style.width = yp + "%";
      r.querySelector('[data-fill="no"]').style.width = np + "%";
      var vc = r.querySelector("[data-votecount]");
      if (mode === "live") vc.innerHTML = '<span class="live-dot"></span><span class="live">' + U("live_label") + '</span> · ' + total + ' ' + (total === 1 ? U("stimme") : U("stimmen"));
      else if (mode === "error") vc.innerHTML = '<span style="color:var(--muted)">' + U("live_off") + '</span> · ' + U("example");
      else vc.textContent = U("example_dist");
    }

    function vote(choice) {
      if (voted) return;
      voted = true;
      $("#voteActions").style.display = "none";
      $("#voteResult").hidden = false;
      if (NGS.Live.isConfigured()) {
        setLoading();
        NGS.Live.castVote(cardId, choice).then(function (row) {
          if (row) applyResult({ yes: row.yes, no: row.no }, "live");
          else applyResult({ yes: 1, no: 0 }, "example");
        }).catch(function (err) {
          console.error("[Story] Live-Vote fehlgeschlagen:", (err && err.message) ? err.message : err);
          applyResult({ yes: 50, no: 50 }, "error");
        });
        sub = NGS.Live.subscribe(cardId, function (c) { applyResult(c, "live"); });
      } else {
        applyResult({ yes: 50, no: 50 }, "example");
      }
    }

    document.addEventListener("click", function (e) {
      var el;
      if ((el = e.target.closest("[data-vote]"))) { vote(el.dataset.vote); return; }
      if ((el = e.target.closest("[data-lang]"))) { if (el.dataset.lang !== lang) { lang = el.dataset.lang; render(); } return; }
    });
  })();
  </script>
</body>
</html>
